<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% block title %}Plataforma de Exposiciones Virtuales{% endblock %}</title>
    {% block meta %}
    <meta name="description" content="Plataforma de Exposiciones Virtuales: recorre en 3D exposiciones de arte publicadas por sus organizadores.">
    <meta property="og:site_name" content="Galería Virtual">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Galería Virtual — Exposiciones en 3D">
    <meta property="og:description" content="Recorre en 3D exposiciones de arte publicadas por sus organizadores.">
    <meta property="og:image" content="{{ url_for('static', filename='favicons/web-app-manifest-512x512.png', _external=True) }}">
    <meta name="twitter:card" content="summary">
    {% endblock %}

    <link rel="icon" href="{{ url_for('static', filename='favicons/favicon.ico') }}" sizes="any">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicons/favicon.svg') }}">
    <link rel="icon" type="image/png" sizes="96x96" href="{{ url_for('static', filename='favicons/favicon-96x96.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicons/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicons/site.webmanifest') }}">
    <meta name="theme-color" content="#0a1f3d">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
